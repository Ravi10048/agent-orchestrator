[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# UP046: keep classic Generic[T] (Pydantic v2 generic models); PEP 695 syntax is riskier here.
ignore = ["E501", "UP046"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection pattern intentionally calls these in argument defaults.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body", "fastapi.Header"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
